services:
  postgres:
    image: postgres:16-alpine
    container_name: taskio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskio-network

  redis:
    image: redis:7-alpine
    container_name: taskio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - taskio-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: taskio-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - taskio-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: taskio-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - taskio-network

  app:
    build: .
    container_name: taskio-app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - ENV_FILE=.env.prod
    networks:
      - taskio-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq-data:

networks:
  taskio-network:
    driver: bridge